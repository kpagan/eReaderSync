<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InkShare - Book Transfer</title>
    <style>
        /* High contrast, E-ink friendly styling */
        body {
            font-family: monospace;
            padding: 20px;
            background: #fff;
            color: #000;
        }

        .box {
            border: 2px solid #000;
            padding: 15px;
            margin-bottom: 20px;
        }

        button,
        input[type="file"],
        input[type="text"],
        input[type="submit"] {
            padding: 10px;
            margin: 5px 0;
            border: 2px solid #000;
            background: #fff;
            font-size: 16px;
        }

        button:active,
        input[type="submit"]:active {
            background: #000;
            color: #fff;
        }

        ul {
            padding-left: 20px;
        }

        li {
            margin-bottom: 10px;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <h1>📚 InkShare</h1>
    <p>Transfer EPUB/PDF files to your E-reader easily.</p>
    <hr>

    <div id="sender" class="box">
        <h3>Send Books</h3>
        <button type="button" onclick="createRoom()">Generate Transfer Code</button>
        <h2 id="roomDisplay" style="letter-spacing: 2px;"></h2>

        <form id="uploadForm" action="/api/upload" method="POST" enctype="multipart/form-data" style="display:none;">
            <input type="hidden" name="roomId" id="formRoomId">
            <input type="file" name="file" accept=".epub,.pdf,.mobi" required><br>
            <button type="submit">Upload Book</button>
        </form>
    </div>

    <div id="receiver" class="box">
        <h3>Receive Books</h3>
        <div>Enter 4 digit Code:</div>
        <form action="/join-room" method="POST">
            <input type="text" name="roomId" id="joinRoomId" placeholder="Enter 4-digit code" maxlength="4" required>
            <input type="submit" value="Connect">
        </form>

        <h3>Available Downloads:</h3>
        <ul id="fileList"></ul>
    </div>

    <div id="messages-container" class="box hidden">
        <textarea id="messages" rows="10"></textarea>
    </div>

    <script>
        var devices = ['kobo', 'kindle', 'tolino', 'ereader'];
        // main function
        try {
            if (isDeviceAReader()) {
                // hide upload for e-Readers
                document.getElementById("sender").classList.add('hidden');
            }
            var activeRoom = getQueryParam('room');
            if (activeRoom) {
                document.getElementById('joinRoomId').value = activeRoom;
                loadRoomFiles(activeRoom);
            }
        } catch (err) {
            log(err);
        }

        function getQueryParam(name) {
            var search = window.location.search.substring(1);
            if (!search) return null;

            var params = search.split('&');
            for (var i = 0; i < params.length; i++) {
                var pair = params[i].split('=');
                if (decodeURIComponent(pair[0]) === name) {
                    return decodeURIComponent(pair[1]);
                }
            }
            return null;
        }

        // Phone/PC side creation (Uses fetch since smartphones support it fine)
        function createRoom() {
            fetch('/api/create-room')
                .then(function (res) { return res.json(); })
                .then(function (data) {
                    document.getElementById('roomDisplay').innerText = "Code: " + data.roomId;
                    document.getElementById('formRoomId').value = data.roomId;
                    document.getElementById('uploadForm').style.display = 'block';
                });
        }

        // e-Reader FIX: Uses old-school XMLHttpRequest (AJAX) which works natively on Kobo
        function loadRoomFiles(roomId) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/room/' + roomId, true);
            xhr.onreadystatechange = function () {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    var list = document.getElementById('fileList');
                    list.innerHTML = '';

                    if (data.error || !data.files.length) {
                        list.innerHTML = '<li>No files found or room expired.</li>';
                        return;
                    }

                    data.files.forEach(function (file) {
                        var li = document.createElement('li');
                        li.innerHTML = '<a href="' + file.serverPath + '" download>📥 Download ' + file.originalName + '</a>';
                        list.appendChild(li);
                    });
                }
            };
            xhr.send();
        }

        function log(msg) {
            document.getElementById("messages-container").classList.remove('hidden');
            document.getElementById('messages').value += msg + '\n';
        }

        function isDeviceAReader() {
            var agent = navigator.userAgent.toLowerCase();
            for (var i = 0; i < devices.length; i++) {
                if (stringContains(agent, devices[i].toLowerCase())) {
                    return true;
                }
            }
            return false;
        }

        function stringContains(str, substr) {
            return str.indexOf(substr) !== -1;
        }
    </script>
</body>

</html>
